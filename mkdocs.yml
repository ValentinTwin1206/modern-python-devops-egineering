site_name: Modern Python DevOps Engineering
site_description: Technical course notes for Python packaging and development environments.
docs_dir: docs

theme:
  name: material
  language: en
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.instant
    - navigation.indexes
    - navigation.top
    - content.code.copy
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: amber
      toggle:
        icon: material/weather-night
        name: Switch to light mode

extra_css:
  - assets/python-palette.css

extra_javascript:
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js
  - assets/javascripts/mermaid.js

markdown_extensions:
  - admonition
  - tables
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Chapter 01:
      - chapter-01/index.md
      - Section 01: chapter-01/section-01.md
      - Section 02: chapter-01/section-02.md
      - Section 03: chapter-01/section-03.md
      - Section 04: chapter-01/section-04.md
  - Chapter 02:
      - chapter-02/index.md
      - Section 01: chapter-02/section-01.md
      - Section 02: chapter-02/section-02.md
      - Section 03: chapter-02/section-03.md
      - Section 04: chapter-02/section-04.md
      - Section 05: chapter-02/section-05.md
      - Section 06: chapter-02/section-06.md
  - Chapter 03:
      - chapter-03/index.md
      - Section 01: chapter-03/section-01.md
      - Section 02: chapter-03/section-02.md
      - Section 03: chapter-03/section-03.md
      - Section 04: chapter-03/section-04.md
      - Section 05: chapter-03/section-05.md
      - Section 06: chapter-03/section-06.md
  - Chapter 04:
      - chapter-04/index.md
      - Section 01: chapter-04/section-01.md
      - Section 02: chapter-04/section-02.md
      - Section 03: chapter-04/section-03.md
      - Section 04: chapter-04/section-04.md
      - Section 05: chapter-04/section-05.md
