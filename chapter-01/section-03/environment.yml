# Conda environment definition.
#
# Runtime packages come from conda-forge. Karva is installed with pip because
# it is part of the shared Chapter 1 dev stack and is distributed on PyPI.
name: tiny-webserver
channels:
  - conda-forge
dependencies:
  - python=3.12
  - bottle=0.13.4
  - ruff=0.15.12
  - pip
  - pip:
      - karva>=0.0.1a5
