# Conda environment definition.
#
# OpenCV and NumPy are scientific packages with native binary dependencies
# (BLAS, libstdc++, libjpeg, etc.). Installing them through conda-forge gives
# a self-contained, reproducible toolchain without compiling anything locally.
name: image-processor
channels:
  - conda-forge
  # - defaults  # Served from repo.anaconda.com and added by default, so it usually does not need to be listed explicitly.
dependencies:
  - python=3.12
  - numpy=2.1.3
  - opencv=4.10.0
  - pip
  - pip:
      - ruff>=0.15.12
      - karva>=0.0.1a5
