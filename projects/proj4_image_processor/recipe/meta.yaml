{% set name = "image-processor" %}
{% set version = "1.0.0" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  # Build from the project root next to this recipe directory.
  path: ..

build:
  number: 0
  noarch: python
  # conda-build generates the console-script wrapper for this entry point.
  entry_points:
    - image-processor = image_processor.main:main
  # Pure-Python project without a setup.py or pyproject.toml. Copy the
  # package straight into the env's site-packages directory.
  script: |
    mkdir -p ${SP_DIR}/image_processor
    cp -r src/image_processor/. ${SP_DIR}/image_processor/

requirements:
  host:
    - python >=3.12
  run:
    - python >=3.12
    - numpy >=2.1
    - py-opencv >=4.10

test:
  imports:
    - image_processor
  commands:
    - image-processor --help

about:
  home: https://github.com/ValentinTwin1206/modern-python-devops-egineering
  summary: OpenCV image-processing showcase distributed as a Conda package.
  license: MIT
